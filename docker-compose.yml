version: '3.1'

services:
  web:
    image: php:8.0-apache
    container_name: php_web_webapp2
    build:
      context: .
      dockerfile: Dockerfile-php
    restart: always
    ports:
      - "8020:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: mariadb_webapp2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: webapp2
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql

volumes:
  db_data:
